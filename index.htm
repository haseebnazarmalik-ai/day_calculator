<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>90 Days Planner Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#764ba2">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #fff;
            overflow: hidden;
        }

        /* Glass Card Effect */
        .app-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 35px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            width: 90%;
            max-width: 380px;
            animation: fadeIn 1s ease-out;
        }

        h1 { font-size: 26px; margin-bottom: 10px; font-weight: 700; color: #fff; }
        p.subtitle { font-size: 14px; opacity: 0.7; margin-bottom: 30px; }

        .input-wrapper {
            background: rgba(255, 255, 255, 0.95);
            padding: 5px;
            border-radius: 15px;
            margin-bottom: 25px;
        }

        input[type="date"] {
            border: none;
            background: transparent;
            padding: 12px;
            font-size: 18px;
            color: #333;
            width: 100%;
            outline: none;
            cursor: pointer;
            text-align: center;
        }

        .result-box {
            margin-top: 20px;
            padding: 25px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            display: none;
            border: 1px dashed rgba(255, 255, 255, 0.3);
            animation: slideUp 0.6s ease-out;
        }

        .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: #aaa; margin-bottom: 8px; }
        .day-output { font-size: 32px; font-weight: 700; color: #00d2ff; margin: 0; }
        .date-output { font-size: 22px; font-weight: 400; color: #3a7bd5; background: #fff; display: inline-block; padding: 5px 15px; border-radius: 50px; margin-top: 10px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-card">
    <h1>90 Days Plan</h1>
    <p class="subtitle">Find the date after 3 months</p>
    
    <div class="input-wrapper">
        <input type="date" id="dateInput" onchange="calcDate()">
    </div>

    <div class="result-box" id="resultBox">
        <div class="label">Future Date</div>
        <div class="day-output" id="dayName">---</div>
        <div class="date-output" id="fullDate">---</div>
    </div>
</div>

<script>
    // 1. Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log("Offline Ready!");
            }).catch(err => console.log("SW Error:", err));
        });
    }

    // 2. Logic to Add 90 Days
    function calcDate() {
        const val = document.getElementById('dateInput').value;
        if (val) {
            let d = new Date(val);
            // Adding 90 days
            d.setDate(d.getDate() + 90);

            const day = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(d);
            
            // Format: DD / MM / YYYY
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            const formattedDate = `${dd} / ${mm} / ${yyyy}`;

            document.getElementById('dayName').innerText = day;
            document.getElementById('fullDate').innerText = formattedDate;
            document.getElementById('resultBox').style.display = 'block';
        }
    }
</script>

</body>
</html>
